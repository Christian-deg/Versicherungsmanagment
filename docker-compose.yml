services:
  backend:
    build: ./backend
    container_name: versicherungs_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: versicherungs_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8181:80"
